services:
  - type: web
    name: iskcon-srisailam


    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: REACT_APP_API_BASE_URL
        value: "" # Empty means it will use relative paths or the fallback
    autoDeploy: true
